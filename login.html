<script>
async function resetarSenha(){

  const email = document.getElementById("email").value;

  if(!email){
      alert("Informe o e-mail.");
      return;
  }

  try{
      await recuperarSenha(email);
      alert("E-mail enviado.");
  }catch(e){
      alert(e.message);
  }

}
</script>
