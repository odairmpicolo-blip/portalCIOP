<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal CIOP / TCGL</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f7fb;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    box-sizing:border-box;
}

.login-brand{
    flex:0 0 auto;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px 16px 0;
}

.login-brand img{
    height:100px;
    max-width:min(320px, 88vw);
    object-fit:contain;
}

.login-main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px 32px;
    box-sizing:border-box;
}

.login-box{
    width:min(420px, 100%);
    background:white;
    border-radius:12px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    box-sizing:border-box;
}

h2.login-title-art{
    margin:0 0 20px;
    text-align:center;
}
h2.login-title-art img{
    display:block;
    width:min(340px, 30vw);
    height:40px;
    max-height:40px;
    margin:0 auto;
    object-fit:contain;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #dfe5ef;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#06245c;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#0b3a8a;
}

.links{
    text-align:center;
    margin-top:15px;
}

.links a{
    color:#06245c;
    text-decoration:none;
    font-size:14px;
}

#erro{
    color:red;
    text-align:center;
    margin-top:10px;
}

.login-loading-overlay{
    position:fixed;
    inset:0;
    z-index:99999;
    display:none;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,rgba(245,247,251,.96),rgba(232,237,246,.96));
    backdrop-filter:blur(8px);
}
.login-loading-overlay.active{display:flex}
.login-loading-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    min-width:220px;
    padding:24px 28px;
    border:1px solid rgba(6,36,92,.12);
    border-radius:10px;
    background:rgba(255,255,255,.92);
    box-shadow:0 18px 50px rgba(16,24,40,.16);
    color:#06245c;
}
.login-loading-mark{position:relative;width:54px;height:54px}
.login-loading-mark::before,.login-loading-mark::after{content:"";position:absolute;inset:0;border-radius:50%;border:4px solid transparent}
.login-loading-mark::before{border-top-color:#06245c;border-right-color:#0b3a8a;animation:loginSpin .85s linear infinite}
.login-loading-mark::after{inset:9px;border-bottom-color:#ff6b00;border-left-color:#ff6b00;animation:loginSpin 1.15s linear infinite reverse}
.login-loading-title{font-size:15px;font-weight:800}
.login-loading-dots{display:flex;gap:5px}
.login-loading-dots span{width:6px;height:6px;border-radius:50%;background:#ff6b00;animation:loginPulse 1s ease-in-out infinite}
.login-loading-dots span:nth-child(2){animation-delay:.15s}.login-loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes loginSpin{to{transform:rotate(360deg)}}
@keyframes loginPulse{0%,80%,100%{opacity:.35;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}









/* Ajuste Codex: titulo do login menor e centralizado */
h2 {
    text-align: center !important;
    font-size: 18px !important;
    line-height: 1.15 !important;
}
/* Fim ajuste Codex */

</style>
<link rel="stylesheet" href="assets/css/portal-titulos.css">
</head>
<body>

<div class="login-brand">
    <img src="assets/img/LOGO_TCGL-removebg-preview.png" alt="TCGL">
</div>

<main class="login-main">
<div class="login-box">

<h2 class="login-title-art" aria-label="Portal CIOP">
    <img src="assets/img/titulo-portal-ciop.png" alt="Portal CIOP">
</h2>

<input type="email"
       id="email"
       placeholder="E-mail">

<input type="password"
       id="senha"
       placeholder="Senha">

<button onclick="login()">
Entrar
</button>

<div class="links">
    <a href="#"
       onclick="resetarSenha(); return false;">
       Esqueci minha senha
    </a>
</div>

<div id="erro"></div>

</div>
</main>

<div id="loginLoading" class="login-loading-overlay" role="status" aria-live="polite">
  <div class="login-loading-box">
    <div class="login-loading-mark" aria-hidden="true"></div>
    <div id="loginLoadingText" class="login-loading-title">Carregando</div>
    <div class="login-loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>
  </div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
 getAuth,
 signInWithEmailAndPassword,
 sendPasswordResetEmail,
 setPersistence,
 browserSessionPersistence
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { firebaseConfig } from "./assets/js/firebase-config.js";
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function mostrarCarregando(texto) {
  document.getElementById("loginLoadingText").textContent = texto || "Carregando";
  document.getElementById("loginLoading").classList.add("active");
}

function ocultarCarregando() {
  document.getElementById("loginLoading").classList.remove("active");
}

function mensagemErroLogin(error) {
  const code = error && error.code ? error.code : "";
  if (code === "auth/user-not-found" || code === "auth/invalid-credential") {
    return "E-mail ou senha incorretos. Confirme se este usuário existe no Firebase Authentication.";
  }
  if (code === "auth/wrong-password") {
    return "Senha incorreta.";
  }
  if (code === "auth/invalid-email") {
    return "E-mail inválido.";
  }
  if (code === "auth/too-many-requests") {
    return "Muitas tentativas. Aguarde um pouco e tente novamente.";
  }
  return "Não foi possível entrar: " + (error.message || code);
}

window.login = async function(){

 const email =
 document.getElementById("email").value;

 const senha =
 document.getElementById("senha").value;

 try{

   mostrarCarregando("Entrando no portal");

   await setPersistence(auth, browserSessionPersistence);

   await signInWithEmailAndPassword(
      auth,
      email,
      senha
   );

   window.location.href =
   "index.html";

 }catch(error){

   ocultarCarregando();

   document.getElementById("erro")
   .innerHTML =
   mensagemErroLogin(error);

 }

}

document.addEventListener("keydown", function(event) {
 const isLoginField =
   event.target &&
   (event.target.id === "email" || event.target.id === "senha");

 if (isLoginField && event.key === "Enter") {
   event.preventDefault();
   login();
 }
});

window.resetarSenha = async function(){

 const email =
 document.getElementById("email").value;

 if(!email){
   alert("Informe seu e-mail.");
   return;
 }

 try{

   mostrarCarregando("Enviando recuperação");

   await sendPasswordResetEmail(
      auth,
      email
   );

   ocultarCarregando();

   alert(
    "E-mail de recuperação enviado."
   );

 }catch(error){

   ocultarCarregando();
   const code = error && error.code ? error.code : "";
   let msg = error.message || "Não foi possível enviar o e-mail.";
   if (code === "auth/user-not-found" || code === "auth/invalid-email") {
     msg = "E-mail não encontrado ou inválido. Confirme o endereço cadastrado no portal.";
   } else if (code === "auth/too-many-requests") {
     msg = "Muitas tentativas. Aguarde alguns minutos.";
   }
   alert(msg);

 }

}

</script>

</body>
</html>
