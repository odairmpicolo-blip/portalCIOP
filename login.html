<div class="bg-blobs" aria-hidden="true"></div>
<div class="bg-blob-mid" aria-hidden="true"></div>

<div class="login-page-v2">
  <form class="login-card-v2" onsubmit="event.preventDefault(); login();">
    <div class="login-brand-v2 portal-brand-mark portal-brand-mark--center" aria-label="Portal CIOP TCGL Operações">
      <img class="portal-brand-art" src="assets/img/titulo-portal-ciop.png" alt="Portal CIOP">
      <span class="portal-brand-meta">TCGL · Operações</span>
    </div>

    <label for="email">E-mail</label>
    <input
      type="email"
      id="email"
      autocomplete="username"
      placeholder="usuario@empresa.com.br"
      required
    >

    <label for="senha">Senha</label>
    <input
      type="password"
      id="senha"
      autocomplete="current-password"
      required
    >

    <div id="erro" class="login-error-v2" role="alert" hidden></div>

    <button type="submit" class="btn-primary" id="btnEntrar">
      Entrar
    </button>

    <button type="button" class="btn-link" onclick="resetarSenha()">
      Esqueci minha senha
    </button>
  </form>
</div>

<div id="loginLoading" class="login-loading-overlay" role="status" aria-live="polite">
  <div class="login-loading-box">
    <div class="login-loading-mark" aria-hidden="true"></div>
    <div id="loginLoadingText" class="login-loading-title">Carregando</div>
    <div class="login-loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>
  </div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
 getAuth,
 signInWithEmailAndPassword,
 sendPasswordResetEmail,
 setPersistence,
 browserSessionPersistence
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { firebaseConfig } from "./assets/js/firebase-config.js";
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function mostrarCarregando(texto) {
  document.getElementById("loginLoadingText").textContent = texto || "Carregando";
  document.getElementById("loginLoading").classList.add("active");
}

function ocultarCarregando() {
  document.getElementById("loginLoading").classList.remove("active");
}

function mostrarErro(mensagem) {
  const el = document.getElementById("erro");
  if (!mensagem) {
    el.hidden = true;
    el.textContent = "";
    return;
  }
  el.hidden = false;
  el.textContent = mensagem;
}

function mensagemErroLogin(error) {
  const code = error && error.code ? error.code : "";
  if (code === "auth/user-not-found" || code === "auth/invalid-credential") {
    return "E-mail ou senha incorretos. Confirme se seu usuário e senha estão corretos.";
  }
  if (code === "auth/wrong-password") {
    return "Senha incorreta.";
  }
  if (code === "auth/invalid-email") {
    return "E-mail inválido.";
  }
  if (code === "auth/too-many-requests") {
    return "Muitas tentativas. Aguarde um pouco e tente novamente.";
  }
  return "Não foi possível entrar: " + (error.message || code);
}

window.login = async function(){

 const email =
 document.getElementById("email").value;

 const senha =
 document.getElementById("senha").value;

 const btn = document.getElementById("btnEntrar");

 try{

   mostrarErro("");
   btn.disabled = true;
   btn.textContent = "Entrando…";
   mostrarCarregando("Entrando no portal");

   await setPersistence(auth, browserSessionPersistence);

   await signInWithEmailAndPassword(
      auth,
      email,
      senha
   );

   window.location.href =
   "index.html";

 }catch(error){

   ocultarCarregando();
   btn.disabled = false;
   btn.textContent = "Entrar";
   mostrarErro(mensagemErroLogin(error));

 }

}

document.addEventListener("keydown", function(event) {
 const isLoginField =
   event.target &&
   (event.target.id === "email" || event.target.id === "senha");

 if (isLoginField && event.key === "Enter") {
   event.preventDefault();
   login();
 }
});

window.resetarSenha = async function(){

 const email =
 document.getElementById("email").value;

 if(!email){
   mostrarErro("Informe seu e-mail para recuperar a senha.");
   return;
 }

 try{

   mostrarErro("");
   mostrarCarregando("Enviando recuperação");

   await sendPasswordResetEmail(
      auth,
      email
   );

   ocultarCarregando();

   alert(
    "E-mail de recuperação enviado."
   );

 }catch(error){

   ocultarCarregando();
   const code = error && error.code ? error.code : "";
   let msg = error.message || "Não foi possível enviar o e-mail.";
   if (code === "auth/user-not-found" || code === "auth/invalid-email") {
     msg = "E-mail não encontrado ou inválido. Confirme o endereço cadastrado no portal.";
   } else if (code === "auth/too-many-requests") {
     msg = "Muitas tentativas. Aguarde alguns minutos.";
   }
   mostrarErro(msg);

 }

}

</script>
