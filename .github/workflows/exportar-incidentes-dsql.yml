name: Exportar incidentes DSQL → JSON

# Lê incidentes_snapshot no Aurora DSQL e publica assets/data/incidentes-tcgl.json no git.
# Janela 04:48–01:28 BRT, a cada 1h02. Silêncio: 01:30–04:48.

on:
  schedule:
    - cron: "48 4 * * *"
      timezone: America/Sao_Paulo
    - cron: "50 5 * * *"
      timezone: America/Sao_Paulo
    - cron: "52 6 * * *"
      timezone: America/Sao_Paulo
    - cron: "54 7 * * *"
      timezone: America/Sao_Paulo
    - cron: "56 8 * * *"
      timezone: America/Sao_Paulo
    - cron: "58 9 * * *"
      timezone: America/Sao_Paulo
    - cron: "0 11 * * *"
      timezone: America/Sao_Paulo
    - cron: "2 12 * * *"
      timezone: America/Sao_Paulo
    - cron: "4 13 * * *"
      timezone: America/Sao_Paulo
    - cron: "6 14 * * *"
      timezone: America/Sao_Paulo
    - cron: "8 15 * * *"
      timezone: America/Sao_Paulo
    - cron: "10 16 * * *"
      timezone: America/Sao_Paulo
    - cron: "12 17 * * *"
      timezone: America/Sao_Paulo
    - cron: "14 18 * * *"
      timezone: America/Sao_Paulo
    - cron: "16 19 * * *"
      timezone: America/Sao_Paulo
    - cron: "18 20 * * *"
      timezone: America/Sao_Paulo
    - cron: "20 21 * * *"
      timezone: America/Sao_Paulo
    - cron: "22 22 * * *"
      timezone: America/Sao_Paulo
    - cron: "24 23 * * *"
      timezone: America/Sao_Paulo
    - cron: "26 0 * * *"
      timezone: America/Sao_Paulo
    - cron: "28 1 * * *"
      timezone: America/Sao_Paulo
  workflow_dispatch:

permissions:
  contents: write

jobs:
  exportar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Exportar incidentes do Aurora DSQL
        env:
          DSQL_CLUSTER_ID: ${{ secrets.DSQL_CLUSTER_ID }}
          DSQL_REGION: sa-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: |
          if [ -z "$DSQL_CLUSTER_ID" ]; then
            echo "DSQL_CLUSTER_ID não configurado — export ignorado."
            exit 0
          fi
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Credenciais AWS ausentes — export ignorado."
            exit 0
          fi
          bash scripts/ci-export-dsql-incidentes.sh

      - name: Publicar JSON no git
        run: bash scripts/ci-git-commit-push.sh "Exporta incidentes do DSQL" assets/data/incidentes-tcgl.json
