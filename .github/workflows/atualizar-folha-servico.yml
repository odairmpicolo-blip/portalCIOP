name: Atualizar snapshots JSON do portal

on:
  schedule:
    # A cada 30 minutos (UTC)
    - cron: "*/30 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [folha-servico]

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Sincronizar com origin
        run: git pull --rebase origin main

      - name: Gerar JSON da folha de serviço
        env:
          PORTAL_ROOT: ${{ github.workspace }}
          FOLHA_SERVICO_TIMEOUT_MS: 180000
        run: node scripts/atualizar-folha-servico-json.mjs

      - name: Publicar JSON da folha de serviço
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza JSON da folha de serviço"
          file_pattern: assets/data/folha-servico/*.json

      - name: Gerar JSON (pontualidade, autuações, liberação)
        env:
          PORTAL_ROOT: ${{ github.workspace }}
          PORTAL_JSON_TIMEOUT_MS: 300000
        run: node scripts/atualizar-portais-json.mjs
        continue-on-error: true

      - name: Publicar outros snapshots JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza snapshots JSON (pontualidade, autuações, liberação)"
          file_pattern: |
            assets/data/pontualidade/*.json
            assets/data/autuacoes/*.json
            assets/data/liberacao/*.json

      - name: Importar snapshots no DSQL (planilha → JSON → AWS)
        env:
          DSQL_CLUSTER_ID: ${{ secrets.DSQL_CLUSTER_ID }}
          DSQL_REGION: sa-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: |
          if [ -z "$DSQL_CLUSTER_ID" ]; then
            echo "DSQL_CLUSTER_ID não configurado — import DSQL ignorado."
            exit 0
          fi
          bash scripts/ci-import-dsql.sh folha pontualidade autuacoes liberacao
