name: Atualizar snapshots JSON do portal

on:
  schedule:
    # A cada 30 minutos (UTC)
    - cron: "*/30 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [folha-servico]

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Gerar JSON da folha de serviço
        env:
          PORTAL_ROOT: ${{ github.workspace }}
        run: node scripts/atualizar-folha-servico-json.mjs

      - name: Gerar JSON (pontualidade, autuações, liberação)
        env:
          PORTAL_ROOT: ${{ github.workspace }}
        run: node scripts/atualizar-portais-json.mjs

      - name: Publicar dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza snapshots JSON do portal"
          file_pattern: |
            assets/data/folha-servico/*.json
            assets/data/pontualidade/*.json
            assets/data/autuacoes/*.json
            assets/data/liberacao/*.json
