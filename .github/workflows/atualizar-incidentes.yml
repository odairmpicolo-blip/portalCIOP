name: Atualizar incidentes TCGL

# portalCIOP: replica JSON do portal-teste, publica no git e importa no Aurora DSQL (AWS).
# O portal-teste busca no TCGL às 07:00 UTC; este workflow roda às 07:30 UTC.

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sincronizar JSON do portal-teste
        env:
          CIOP_INCIDENTES_USUARIO: ${{ secrets.CIOP_INCIDENTES_USUARIO }}
          CIOP_INCIDENTES_SENHA: ${{ secrets.CIOP_INCIDENTES_SENHA }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: |
          URL="https://raw.githubusercontent.com/odairmpicolo-blip/portal-teste/main/assets/data/incidentes-tcgl.json"
          for i in 1 2 3 4 5; do
            if curl -fsSL --max-time 120 "$URL" -o assets/data/incidentes-tcgl.json; then
              node -e "
                const fs = require('fs');
                const p = 'assets/data/incidentes-tcgl.json';
                const data = JSON.parse(fs.readFileSync(p, 'utf8'));
                const n = data.incidentes?.length || data.totalExtraido || 0;
                console.log('JSON do portal-teste OK:', n, 'incidentes,', fs.statSync(p).size, 'bytes');
              "
              exit 0
            fi
            echo "Tentativa $i falhou ao baixar $URL — aguardando 20s..."
            sleep 20
          done
          echo "Fallback: buscar direto no TCGL..."
          node scripts/atualizar-incidentes-tcgl.mjs

      - name: Publicar dados atualizados
        run: bash scripts/ci-git-commit-push.sh "Atualiza incidentes TCGL" assets/data/incidentes-tcgl.json

      - name: Importar incidentes no Aurora DSQL (AWS)
        env:
          DSQL_CLUSTER_ID: ${{ secrets.DSQL_CLUSTER_ID }}
          DSQL_REGION: sa-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: |
          if [ -z "$DSQL_CLUSTER_ID" ]; then
            echo "ERRO: DSQL_CLUSTER_ID não configurado nos secrets do portalCIOP." >&2
            exit 1
          fi
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "ERRO: AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY ausentes nos secrets do portalCIOP." >&2
            exit 1
          fi
          bash scripts/ci-import-dsql.sh incidentes
