name: Atualizar incidentes TCGL

# portalCIOP: TCGL → Aurora DSQL (único import no banco AWS).
# JSON no git vem do workflow exportar-incidentes-dsql.yml (DSQL → git).
# Agendamento: todo dia às 04:48 (horário de Brasília).

on:
  schedule:
    - cron: "48 4 * * *"
      timezone: America/Sao_Paulo
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Buscar incidentes no TCGL
        env:
          CIOP_INCIDENTES_USUARIO: ${{ secrets.CIOP_INCIDENTES_USUARIO }}
          CIOP_INCIDENTES_SENHA: ${{ secrets.CIOP_INCIDENTES_SENHA }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: node scripts/atualizar-incidentes-tcgl.mjs

      - name: Importar incidentes no Aurora DSQL (AWS)
        env:
          DSQL_CLUSTER_ID: ${{ secrets.DSQL_CLUSTER_ID }}
          DSQL_REGION: sa-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: |
          if [ -z "$DSQL_CLUSTER_ID" ]; then
            echo "ERRO: DSQL_CLUSTER_ID não configurado nos secrets do portalCIOP." >&2
            exit 1
          fi
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "ERRO: AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY ausentes nos secrets do portalCIOP." >&2
            exit 1
          fi
          bash scripts/ci-import-dsql.sh incidentes
