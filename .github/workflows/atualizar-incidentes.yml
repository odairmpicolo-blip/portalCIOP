name: Atualizar incidentes TCGL

on:
  schedule:
    # 06:00 UTC = 03:00 horário de Brasília (backup se o PC local falhar)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Sincronizar com origin
        run: git pull --rebase origin main

      - name: Atualizar incidentes TCGL
        env:
          CIOP_INCIDENTES_USUARIO: ${{ secrets.CIOP_INCIDENTES_USUARIO }}
          CIOP_INCIDENTES_SENHA: ${{ secrets.CIOP_INCIDENTES_SENHA }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: node scripts/atualizar-incidentes-tcgl.mjs

      - name: Publicar dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza incidentes TCGL"
          file_pattern: assets/data/incidentes-tcgl.json

      - name: Importar incidentes no DSQL (planilha → JSON → AWS)
        env:
          DSQL_CLUSTER_ID: ${{ secrets.DSQL_CLUSTER_ID }}
          DSQL_REGION: sa-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: |
          if [ -z "$DSQL_CLUSTER_ID" ]; then
            echo "DSQL_CLUSTER_ID não configurado — import DSQL ignorado."
            exit 0
          fi
          bash scripts/ci-import-dsql.sh incidentes
