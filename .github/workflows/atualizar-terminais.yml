name: Atualizar terminais planilha

on:
  schedule:
    # A cada 5 minutos (UTC)
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Atualizar snapshot da planilha
        env:
          PORTAL_ROOT: ${{ github.workspace }}
        run: node scripts/atualizar-terminais-planilha.mjs

      - name: Publicar dados atualizados
        run: bash scripts/ci-git-commit-push.sh "Atualiza terminais agora" assets/data/terminais-agora.json

      - name: Importar terminais no DSQL (planilha → JSON → AWS)
        env:
          DSQL_CLUSTER_ID: ${{ secrets.DSQL_CLUSTER_ID }}
          DSQL_REGION: sa-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: |
          if [ -z "$DSQL_CLUSTER_ID" ]; then
            echo "DSQL_CLUSTER_ID não configurado — import DSQL ignorado."
            exit 0
          fi
          bash scripts/ci-import-dsql.sh terminais

      - name: Importar terminais na API AWS (opcional)
        env:
          PORTAL_AWS_API_URL: ${{ secrets.PORTAL_AWS_API_URL }}
          PORTAL_API_KEY: ${{ secrets.PORTAL_API_KEY }}
        run: |
          if [ -z "$PORTAL_AWS_API_URL" ] || [ -z "$PORTAL_API_KEY" ]; then
            echo "PORTAL_AWS_API_URL / PORTAL_API_KEY não configurados — import API ignorado."
            exit 0
          fi
          node scripts/importar-terminais-aws.mjs
