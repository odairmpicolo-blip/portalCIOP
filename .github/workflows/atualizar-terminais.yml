name: Atualizar terminais planilha

on:
  schedule:
    # A cada 5 minutos (UTC)
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Sincronizar com origin
        run: git pull --rebase --autostash origin main

      - name: Atualizar snapshot da planilha
        env:
          PORTAL_ROOT: ${{ github.workspace }}
        run: node scripts/atualizar-terminais-planilha.mjs

      - name: Sincronizar antes do commit
        run: git pull --rebase --autostash origin main

      - name: Publicar dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza terminais agora"
          file_pattern: assets/data/terminais-agora.json
