name: Atualizar terminais planilha

on:
  schedule:
    # A cada 5 minutos (UTC)
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Atualizar snapshot da planilha
        env:
          PORTAL_ROOT: ${{ github.workspace }}
        run: node scripts/atualizar-terminais-planilha.mjs

      - name: Sincronizar com origin
        run: git pull --rebase origin main

      - name: Publicar dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza terminais agora"
          file_pattern: assets/data/terminais-agora.json

      - name: Instalar dependências
        run: npm ci

      - name: Importar terminais no Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_SA_PATH: ${{ runner.temp }}/firebase-sa.json
        run: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT não configurado — import Firestore ignorado."
            exit 0
          fi
          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" > "${FIREBASE_SA_PATH}"
          export FIREBASE_SERVICE_ACCOUNT="${FIREBASE_SA_PATH}"
          npm run import-terminais-firestore

      - name: Importar terminais no DSQL (planilha → JSON → AWS)
        env:
          DSQL_CLUSTER_ID: ${{ secrets.DSQL_CLUSTER_ID }}
          DSQL_REGION: sa-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: |
          if [ -z "$DSQL_CLUSTER_ID" ]; then
            echo "DSQL_CLUSTER_ID não configurado — import DSQL ignorado."
            exit 0
          fi
          bash scripts/ci-import-dsql.sh terminais

      - name: Importar terminais na API AWS (opcional)
        env:
          PORTAL_AWS_API_URL: ${{ secrets.PORTAL_AWS_API_URL }}
          PORTAL_API_KEY: ${{ secrets.PORTAL_API_KEY }}
        run: |
          if [ -z "$PORTAL_AWS_API_URL" ] || [ -z "$PORTAL_API_KEY" ]; then
            echo "PORTAL_AWS_API_URL / PORTAL_API_KEY não configurados — import API ignorado."
            exit 0
          fi
          node scripts/importar-terminais-aws.mjs
