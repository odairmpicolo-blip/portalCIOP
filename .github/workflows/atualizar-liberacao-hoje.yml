name: Atualizar JSON liberação hoje

on:
  schedule:
    # A cada 3 minutos (UTC) — API → JSON centralizado para todos os usuários
    - cron: "*/3 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [folha-servico, liberacao]

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Gerar JSON de liberação (hoje)
        env:
          PORTAL_ROOT: ${{ github.workspace }}
          PORTAL_JSON_TIMEOUT_MS: 180000
        run: node scripts/atualizar-portais-json.mjs --liberacao-hoje

      - name: Sincronizar com origin
        run: git pull --rebase origin main

      - name: Publicar JSON de liberação (hoje)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza JSON liberação hoje"
          file_pattern: assets/data/liberacao/*.json

      - name: Instalar dependências
        run: npm ci

      - name: Importar liberação no Firestore (janela API planilha)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_SA_PATH: ${{ runner.temp }}/firebase-sa.json
        run: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT não configurado — import Firestore ignorado."
            exit 0
          fi
          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" > "${FIREBASE_SA_PATH}"
          export FIREBASE_SERVICE_ACCOUNT="${FIREBASE_SA_PATH}"
          npm run import-liberacao-firestore

      - name: Importar liberação hoje no DSQL (planilha → JSON → AWS)
        env:
          DSQL_CLUSTER_ID: ${{ secrets.DSQL_CLUSTER_ID }}
          DSQL_REGION: sa-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: |
          if [ -z "$DSQL_CLUSTER_ID" ]; then
            echo "DSQL_CLUSTER_ID não configurado — import DSQL ignorado."
            exit 0
          fi
          bash scripts/ci-import-dsql.sh liberacao-hoje
