# Publica o portal estático no GitHub Pages (domínio customizado via hosting/CNAME ou variável PORTAL_CUSTOM_DOMAIN).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "assets/**"
      - "index.html"
      - "login.html"
      - "hosting/CNAME"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

concurrency:
  group: github-pages-portal
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4

      - name: Preparar site estático
        env:
          CUSTOM_DOMAIN: ${{ vars.PORTAL_CUSTOM_DOMAIN }}
          PORTAL_AWS_API_URL: ${{ secrets.PORTAL_AWS_API_URL }}
        run: |
          set -euo pipefail
          mkdir site
          cp index.html login.html site/
          cp -r pages assets site/
          touch site/.nojekyll

          if [ -n "${CUSTOM_DOMAIN:-}" ]; then
            echo "$CUSTOM_DOMAIN" > site/CNAME
            echo "Domínio customizado (variável): $CUSTOM_DOMAIN"
          elif [ -f hosting/CNAME ]; then
            cp hosting/CNAME site/CNAME
            echo "Domínio customizado (hosting/CNAME): $(cat site/CNAME)"
          else
            echo "Sem CNAME — site em https://odairmpicolo-blip.github.io/portalCIOP/"
            echo "Para ativar domínio após DNS: bash scripts/ativar-dominio-portal.sh"
          fi

          if [ -n "${PORTAL_AWS_API_URL:-}" ]; then
            node -e "
              const fs = require('fs');
              const path = 'site/assets/data/portal-runtime.json';
              const url = process.env.PORTAL_AWS_API_URL.replace(/\\/$/, '');
              const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
              cfg.awsApiUrl = url;
              delete cfg.devApiKey;
              fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n');
              console.log('portal-runtime.json -> awsApiUrl:', url);
            "
          else
            echo "PORTAL_AWS_API_URL não definida — portal-runtime.json mantém valor do repositório"
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
