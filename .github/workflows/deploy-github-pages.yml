# Publica o portal estático no GitHub Pages (domínio customizado via hosting/CNAME ou variável PORTAL_CUSTOM_DOMAIN).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "assets/**"
      - "index.html"
      - "login.html"
      - "hosting/CNAME.aguardando-dns"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

concurrency:
  group: github-pages-portal
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4

      - name: Preparar site estático
        env:
          CUSTOM_DOMAIN: ${{ vars.PORTAL_CUSTOM_DOMAIN }}
        run: |
          set -euo pipefail
          mkdir site
          cp index.html login.html site/
          cp -r pages assets site/
          touch site/.nojekyll

          if [ -n "${CUSTOM_DOMAIN:-}" ]; then
            echo "$CUSTOM_DOMAIN" > site/CNAME
            echo "Domínio customizado (variável): $CUSTOM_DOMAIN"
          else
            echo "Sem CNAME — site em https://odairmpicolo-blip.github.io/portalCIOP/"
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
