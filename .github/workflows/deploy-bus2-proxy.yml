name: Deploy Bus2 Proxy

# Manual apenas: o usuário IAM do GitHub não tem CloudFormation.
# O proxy já foi implantado via `aws login && bash scripts/deploy-bus2-proxy.sh`.
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Implantar proxy Bus2
        run: bash scripts/deploy-bus2-proxy.sh
        env:
          SKIP_GH_SECRET: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUSTIME_API_KEY: ${{ secrets.BUSTIME_API_KEY }}

      - name: Redeploy GitHub Pages (portal-runtime)
        run: gh workflow run deploy-github-pages.yml
        env:
          GH_TOKEN: ${{ github.token }}
