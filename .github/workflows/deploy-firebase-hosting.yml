# Publica o portal estático no Firebase Hosting (produção portal-ciop.web.app).
name: Deploy Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "assets/**"
      - "index.html"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch:

concurrency:
  group: firebase-hosting-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4

      - name: Publicar no Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: portal-ciop
          channelId: live
