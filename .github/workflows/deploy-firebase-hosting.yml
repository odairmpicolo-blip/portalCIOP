# DESABILITADO temporariamente — deploy Firebase Hosting pausado.
# Para reativar: restaurar o trigger push e remover if: false do job deploy.
name: Deploy Firebase Hosting

on:
  workflow_dispatch:

concurrency:
  group: firebase-hosting-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4

      - name: Publicar no Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: portal-ciop
          channelId: live
