AWSTemplateFormatVersion: "2010-09-09"
Description: Portal CIOP - FleetBus on-demand (1 veiculo por vez) -> cache S3 -> API HTTP para o mapa "FleetBus Agora" (sa-east-1).

Parameters:
  FleetbusSecretName:
    Type: String
    Default: portal-ciop/fleetbus-sync
  FleetbusClientId:
    Type: String
    Default: cd-avm4-spa
  ConsumeWindowMs:
    Type: String
    Default: "6000"

Resources:
  FleetbusStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FleetbusSyncRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: portal-fleetbus-s3-secrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "${FleetbusStateBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${FleetbusSecretName}*"

  FleetbusFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: portal-ciop-fleetbus-sync
      Description: Proxy on-demand FleetBus (1 veiculo por vez) para o mapa FleetBus Agora
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt FleetbusSyncRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          FLEETBUS_SECRET_NAME: !Ref FleetbusSecretName
          FLEETBUS_CLIENT_ID: !Ref FleetbusClientId
          FLEETBUS_STATE_S3_BUCKET: !Ref FleetbusStateBucket
          FLEETBUS_CONSUME_WINDOW_MS: !Ref ConsumeWindowMs
      Code:
        ZipFile: |
          export const handler = async () => ({ ok: false, error: "Deploy o pacote com scripts/build-fleetbus-lambda.sh" });

  FleetbusHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: portal-ciop-fleetbus-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type

  FleetbusApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref FleetbusHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt FleetbusFunction.Arn
      PayloadFormatVersion: "2.0"

  FleetbusApiRouteLive:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref FleetbusHttpApi
      RouteKey: "GET /live"
      Target: !Sub "integrations/${FleetbusApiIntegration}"

  FleetbusApiRouteVehicles:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref FleetbusHttpApi
      RouteKey: "GET /vehicles"
      Target: !Sub "integrations/${FleetbusApiIntegration}"

  FleetbusApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref FleetbusHttpApi
      StageName: "$default"
      AutoDeploy: true

  FleetbusApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FleetbusFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FleetbusHttpApi}/*/*/*"

Outputs:
  FunctionName:
    Value: !Ref FleetbusFunction
  StateBucket:
    Value: !Ref FleetbusStateBucket
  ApiBaseUrl:
    Value: !Sub "https://${FleetbusHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
