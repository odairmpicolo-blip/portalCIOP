AWSTemplateFormatVersion: "2010-09-09"
Description: Portal CIOP — sync incidentes TCGL → S3 cache → Aurora DSQL (sa-east-1). 4x/dia às 23h, 05h, 11h e 17h (Brasília).

Parameters:
  DsqlClusterId:
    Type: String
    Default: ort34httzig7iktrneb4ytcy5u
  IncidentesSecretName:
    Type: String
    Default: portal-ciop/incidentes-sync

Resources:
  IncidentesStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  IncidentesSyncRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: portal-incidentes-dsql-s3-secrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: dsql:DbConnectAdmin
                Resource: !Sub "arn:aws:dsql:${AWS::Region}:${AWS::AccountId}:cluster/${DsqlClusterId}"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt IncidentesStateBucket.Arn
                  - !Sub "${IncidentesStateBucket.Arn}/*"
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${IncidentesSecretName}*"

  IncidentesSyncFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: portal-ciop-incidentes-sync
      Description: Busca incidentes TCGL e importa no Aurora DSQL
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt IncidentesSyncRole.Arn
      Timeout: 900
      MemorySize: 1024
      EphemeralStorage:
        Size: 1024
      Environment:
        Variables:
          DSQL_CLUSTER_ID: !Ref DsqlClusterId
          DSQL_REGION: !Ref AWS::Region
          DSQL_USER: admin
          SYNC_INCIDENTES_SKIP_GIT: "1"
          INCIDENTES_STATE_S3_BUCKET: !Ref IncidentesStateBucket
          INCIDENTES_STATE_S3_KEY: incidentes-tcgl.json
          INCIDENTES_SECRET_NAME: !Ref IncidentesSecretName
          PORTAL_ROOT: /var/task/portal
          PORTAL_DATA_DIR: /tmp/portal-data
          CIOP_INCIDENTES_DATA_MIN: "2026-01-01"
      Code:
        ZipFile: |
          export const handler = async () => ({ ok: false, error: "Deploy o pacote com scripts/build-incidentes-lambda.sh" });

  # EventBridge cron em UTC (Brasília = UTC−3): 23h, 05h, 11h, 17h → 02h, 08h, 14h, 20h UTC
  IncidentesSchedule2300BRT:
    Type: AWS::Events::Rule
    Properties:
      Description: Sync incidentes TCGL → DSQL — 23:00 Brasília
      ScheduleExpression: cron(0 2 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt IncidentesSyncFunction.Arn
          Id: IncidentesSync2300

  IncidentesSchedule0500BRT:
    Type: AWS::Events::Rule
    Properties:
      Description: Sync incidentes TCGL → DSQL — 05:00 Brasília
      ScheduleExpression: cron(0 8 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt IncidentesSyncFunction.Arn
          Id: IncidentesSync0500

  IncidentesSchedule1100BRT:
    Type: AWS::Events::Rule
    Properties:
      Description: Sync incidentes TCGL → DSQL — 11:00 Brasília
      ScheduleExpression: cron(0 14 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt IncidentesSyncFunction.Arn
          Id: IncidentesSync1100

  IncidentesSchedule1700BRT:
    Type: AWS::Events::Rule
    Properties:
      Description: Sync incidentes TCGL → DSQL — 17:00 Brasília
      ScheduleExpression: cron(0 20 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt IncidentesSyncFunction.Arn
          Id: IncidentesSync1700

  IncidentesSchedule2300Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IncidentesSyncFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt IncidentesSchedule2300BRT.Arn

  IncidentesSchedule0500Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IncidentesSyncFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt IncidentesSchedule0500BRT.Arn

  IncidentesSchedule1100Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IncidentesSyncFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt IncidentesSchedule1100BRT.Arn

  IncidentesSchedule1700Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IncidentesSyncFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt IncidentesSchedule1700BRT.Arn

Outputs:
  FunctionName:
    Value: !Ref IncidentesSyncFunction
  StateBucket:
    Value: !Ref IncidentesStateBucket
  StateBucketArn:
    Value: !GetAtt IncidentesStateBucket.Arn
  ScheduleBrasilia:
    Value: "23:00, 05:00, 11:00, 17:00 (4x/dia, a cada 6h)"
