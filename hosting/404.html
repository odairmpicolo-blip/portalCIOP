<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal CIOP</title>
  <script>
    (function () {
      var path = location.pathname + location.search + location.hash;
      if (path.indexOf('/app/') === -1) return;
      if (path === '/app/' || path === '/app/index.html') return;
      try {
        sessionStorage.setItem('portal-spa-redirect', path);
      } catch (e) {}
      location.replace('/app/');
    })();
  </script>
</head>
<body></body>
</html>
