/* Dashboard autuações — KPIs e gráficos */
.cards{grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.card-highlight{background:linear-gradient(145deg,#fff7ed 0%,#fff 55%,#fff4e6 100%);border:2px solid #ff6b00;box-shadow:0 10px 24px rgba(255,107,0,.18)}
.card-highlight .icon{background:linear-gradient(135deg,#d94b00,#ff7a18)!important}
.card-highlight .card-title{color:#9a3412}
.card-highlight .card-value{font-size:24px;line-height:1.05;color:#c2410c}
.card-highlight .card-sub{color:#9a3412;font-weight:700}
.charts-layout{
  display:grid;grid-template-columns:1.25fr .9fr 1fr;gap:14px;
  margin-bottom:12px;order:3;min-height:320px;align-items:stretch;
}
.chart-box-wide{min-height:0}
.chart-box-agent .chart-canvas-wrap{min-height:300px;background:linear-gradient(180deg,rgba(6,36,92,.02),transparent 40%);border-radius:10px}
.chart-box-period .chart-canvas-wrap{background:linear-gradient(180deg,rgba(255,107,0,.03),transparent 45%);border-radius:10px}
.chart-box-motivos{display:flex;flex-direction:column;min-height:0}
.chart-box-motivos .chart-area-motivos{display:flex;flex:1;min-height:0;flex-direction:column;gap:10px;align-items:stretch}
.chart-box-motivos .pie-wrap{
  position:relative;flex:0 0 auto;width:172px;max-width:100%;aspect-ratio:1;
  margin:4px auto 0;display:flex;align-items:center;justify-content:center;
}
.chart-box-motivos .pie-wrap::before{
  content:"";position:absolute;inset:6%;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle at 50% 28%, rgba(0,212,255,.18), transparent 68%);
  box-shadow:0 12px 28px rgba(0,212,255,.1);
}
.chart-box-motivos .pie-wrap::after{
  content:"";position:absolute;left:12%;right:12%;bottom:4%;height:14%;border-radius:50%;
  background:radial-gradient(ellipse, rgba(7,31,87,.12), transparent 70%);
  pointer-events:none;z-index:0;
}
.chart-box-motivos .pie-wrap canvas{display:block;position:relative;z-index:1;flex-shrink:0}
.chart-box-motivos .legend{
  flex:1;min-width:0;min-height:88px;max-height:none;overflow:visible;padding-right:2px;
  display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;align-content:start;
}
.chart-box-motivos .legend-row{margin-bottom:0}
.chart-box{
  background:linear-gradient(145deg,#fff 0%,#f8fbff 48%,#f3f7ff 100%);
  border:1px solid rgba(6,36,92,.1);
  border-radius:14px;
  padding:14px 16px 12px;
  box-shadow:0 12px 32px rgba(6,36,92,.08), inset 0 1px 0 rgba(255,255,255,.9);
  display:flex;flex-direction:column;min-height:260px;
  position:relative;overflow:hidden;
}
.chart-box::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#00d4ff,#1359c7 45%,#ff6b00);
  opacity:.85;
}
.chart-box h3{
  margin:0 0 10px;padding-bottom:8px;
  color:#071f57;font-size:14px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;
  border-bottom:1px solid rgba(6,36,92,.08);
}
.period-years-row{display:flex;gap:6px;justify-content:space-between;flex-wrap:wrap;margin:-2px 0 8px;padding:0 2px}
.period-years-row[hidden]{display:none!important}
.year-chip{
  flex:1 1 0;text-align:center;min-width:36px;padding:4px 6px;border-radius:999px;
  background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(19,89,199,.1));
  border:1px solid rgba(0,212,255,.22);color:#071f57;font-size:10px;font-weight:800;
  box-shadow:0 2px 8px rgba(0,212,255,.08);
}
.chart-box-motivos .legend-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#253047;font-weight:600}
.chart-box-motivos .legend-row{
  display:grid;grid-template-columns:10px 1fr 40px;gap:6px;align-items:center;
  font-size:10px;margin-bottom:6px;padding:5px 6px;border-radius:8px;
  background:rgba(255,255,255,.72);border:1px solid rgba(6,36,92,.06);
}
.chart-box-motivos .legend-bar-wrap{display:none}
.chart-box-motivos .legend-row b{color:#071f57;font-size:10px;text-align:right}
.chart-box-motivos .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.chart-canvas-wrap{position:relative;flex:1;min-height:220px}
.chart-canvas-wrap canvas{width:100%!important;height:100%!important}
.chart-empty{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:#667085;font-size:12px;font-weight:700;
  background:linear-gradient(180deg,rgba(255,255,255,.82),rgba(248,251,255,.9));
  border-radius:10px;
}
.chart-empty[hidden]{display:none!important}
.card-sub-money{font-size:12px;color:#9a3412;font-weight:800;margin-top:2px}
td.money{font-weight:800;color:#9a3412;white-space:nowrap}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{background:#0a2a6e}
.sort-indicator{display:inline-block;margin-left:4px;font-size:11px;opacity:.85}
.charts-layout{order:3}
@media(max-width:1300px){.cards{grid-template-columns:repeat(3,minmax(0,1fr))}.charts-layout{grid-template-columns:1fr}}
@media(max-width:700px){.cards{grid-template-columns:1fr 1fr}}

/* ===== Redesign iOS26 Liquid Glass (mobile/app nativo) =====
   Obs.: o cabeçalho (.header) e a tab bar são do shell React e ficam
   escondidos/sobrepostos aqui — este bloco cuida só do conteúdo.
   Suporta escuro (padrão) e claro (html.native-light), sincronizado
   pelo próprio shell nativo. Fontes ampliadas para leitura confortável. */
@media (max-width:720px){
  .body-bg-wall,
  .body-bg-stain{
    display:none !important;
  }
  :root{
    --jewel-1:#7a5cff;
    --jewel-2:#c04fd6;
    --jewel-shadow:0 10px 26px -8px rgba(122,92,255,.65);

    --glass-bg:rgba(255,255,255,.08);
    --glass-bg-strong:rgba(255,255,255,.13);
    --glass-border:rgba(255,255,255,.16);
    --glass-blur:blur(30px) saturate(180%);
    --glass-shadow:0 20px 40px -18px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.18);

    --ink:#fff;
    --ink-soft:rgba(255,255,255,.6);
    --ink-faint:rgba(255,255,255,.48);
    --field-bg:rgba(255,255,255,.07);
    --row-div:rgba(255,255,255,.08);
    --th-bg:rgba(255,255,255,.05);

    --g-green:#4ade80;
    --g-amber:#fbbf24;
    --g-red:#f87171;
    --g-blue:#60a5fa;
    --g-orange:#ff9a52;
    --g-purple:#c48bff;
  }

  html.native-light{
    --glass-bg:rgba(255,255,255,.6);
    --glass-bg-strong:rgba(255,255,255,.8);
    --glass-border:rgba(30,20,70,.10);
    --glass-shadow:0 16px 34px -16px rgba(40,25,90,.22), inset 0 1px 0 rgba(255,255,255,.75);

    --ink:#18182a;
    --ink-soft:rgba(24,24,42,.62);
    --ink-faint:rgba(24,24,42,.5);
    --field-bg:rgba(255,255,255,.8);
    --row-div:rgba(30,20,70,.08);
    --th-bg:rgba(30,20,70,.045);

    --g-green:#15803d;
    --g-amber:#b45309;
    --g-red:#dc2626;
    --g-blue:#2563eb;
    --g-orange:#c2410c;
    --g-purple:#7045b8;
  }

  body{
    height:auto !important;
    overflow:visible !important;
    background:
      radial-gradient(circle at 15% 8%, rgba(122,92,255,.4) 0%, transparent 40%),
      radial-gradient(circle at 90% 15%, rgba(255,110,180,.3) 0%, transparent 38%),
      radial-gradient(circle at 20% 60%, rgba(60,180,255,.26) 0%, transparent 42%),
      radial-gradient(circle at 85% 78%, rgba(255,170,60,.2) 0%, transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(80,255,190,.16) 0%, transparent 45%),
      #0d0e14 !important;
    color:var(--ink) !important;
  }
  html.native-light body{
    background:
      radial-gradient(circle at 15% 8%, rgba(122,92,255,.3) 0%, transparent 40%),
      radial-gradient(circle at 90% 15%, rgba(255,110,180,.24) 0%, transparent 38%),
      radial-gradient(circle at 20% 60%, rgba(60,180,255,.2) 0%, transparent 42%),
      radial-gradient(circle at 85% 78%, rgba(255,170,60,.18) 0%, transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(80,255,190,.16) 0%, transparent 45%),
      #f2effa !important;
  }

  .header{display:none !important;}

  .wrap{
    height:auto !important;
    overflow:visible !important;
    padding:calc(14px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-left)) 28px calc(14px + env(safe-area-inset-right)) !important;
    gap:16px !important;
    display:flex !important;
    flex-direction:column !important;
  }
  html.native-embedded .wrap{padding-top:14px !important;}

  /* ---- Filtros ---- */
  .filters-panel{
    background:var(--glass-bg) !important;
    backdrop-filter:var(--glass-blur) !important;
    -webkit-backdrop-filter:var(--glass-blur) !important;
    border:1px solid var(--glass-border) !important;
    border-radius:24px !important;
    box-shadow:var(--glass-shadow) !important;
    padding:18px !important;
  }
  .filters-head{
    grid-template-columns:1fr !important;
    gap:12px !important;
    justify-items:center !important;
  }
  .filters-head-title{
    color:var(--ink) !important;

    font-weight:800 !important;
  }
  .filters-head-title svg{width:18px !important;height:18px !important;}
  .filters-head .btn-portal{
    justify-self:stretch !important;
    width:100% !important;
    background:linear-gradient(135deg, var(--jewel-1), var(--jewel-2)) !important;
    border:1px solid color-mix(in srgb, var(--jewel-1) 40%, transparent) !important;
    color:#fff !important;
    box-shadow:var(--jewel-shadow) !important;

  .filters-head-action{justify-self:stretch !important;width:100% !important;}

    font-weight:700 !important;

  .card-title{color:var(--ink-soft) !important;font-size:13px !important;font-weight:700 !important;}
  .card-value{color:var(--ink) !important;font-size:22px !important;font-weight:800 !important;}

  .card-highlight .card-sub{color:var(--ink-faint) !important;}

  /* ---- Gráficos ---- */

  .chart-box{
    background:var(--glass-bg) !important;
    backdrop-filter:var(--glass-blur) !important;

    background:var(--field-bg) !important;

  .chart-box-motivos .legend-row b{color:var(--ink) !important;font-size:13px !important;}

  /* ---- Tabela ---- */
  .table-wrap{
    background:var(--glass-bg) !important;
    backdrop-filter:var(--glass-blur) !important;
    -webkit-backdrop-filter:var(--glass-blur) !important;

  tr:hover td{background:color-mix(in srgb, var(--jewel-1) 10%, transparent) !important;}
  .no-data{color:var(--ink-faint) !important;font-size:15px !important;}
