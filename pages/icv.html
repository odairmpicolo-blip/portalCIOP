<!doctype html>
<html lang="pt-BR">
<head>
<script>document.documentElement.classList.add("portal-auth-pending");</script>
<style id="portalAuthBootStyle">.portal-auth-pending body > :not(#portalLoadingOverlay){visibility:hidden!important;}</style>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Índice de Cumprimento de Viagem - ICV - Portal CIOP</title>
<style>
:root { --blue:#06245c; --blue2:#0b3a8a; --orange:#ff6b00; --bg:#f5f7fb; --border:#dfe5ef; --text:#101828; --muted:#667085; --icv:#0f766e; }
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); font-family:Arial,Helvetica,sans-serif; color:var(--text); display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.header-actions {
    justify-self: end;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    min-width: 0;
}
.header-actions .ciop-session { flex: 0 1 auto; }
.header-actions .logo-tcgl-link { display: flex; align-items: center; flex: 0 0 auto; }
.logo-tcgl { height: 52px; max-height: 52px; width: auto; object-fit: contain; background: transparent; }
@media (min-width: 1101px) {
    .header {
        grid-template-columns: minmax(0, 1fr) minmax(0, auto) minmax(0, 1fr) !important;
    }
    .header > a:first-child { justify-self: start !important; }
    .header > .icv-title-wrap {
        justify-self: center !important;
        text-align: center !important;
    }
    .header-actions { justify-self: end !important; }
}
@media (max-width: 900px) {
    .header-actions {
        justify-self: center;
        justify-content: center;
        flex-wrap: wrap;
        width: 100%;
    }
}
.main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.content-body { padding:12px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
.icv-title-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 0;
}
h1.icv-title-art {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 0;
}
.icv-title-art img {
    display: block;
    width: min(340px, 30vw) !important;
    height: 40px !important;
    max-height: 40px !important;
    max-width: 100% !important;
    object-fit: contain !important;
    background: transparent;
}
.icv-title-wrap .subtitle {
    margin-top: 4px;
    color: var(--blue);
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
}
.toolbar { background:#fff; border:1px solid var(--border); border-radius:6px; padding:10px 12px; display:flex; align-items:center; gap:12px; box-shadow:0 8px 24px rgba(16,24,40,.05); border-left:3px solid var(--orange); }
.toolbar-actions { display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap; }
.btn-portal { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:36px; border-radius:8px; padding:8px 14px; background:linear-gradient(135deg,var(--blue),var(--blue2)); color:#fff; text-decoration:none; font-weight:700; font-size:12px; box-shadow:0 8px 16px rgba(6,36,92,.16); transition:transform .2s,box-shadow .2s; white-space:nowrap; }
.btn-portal:hover { background:linear-gradient(135deg,var(--blue),var(--blue2)); transform:translateY(-1px); box-shadow:0 10px 20px rgba(6,36,92,.2); }
.btn-icon { display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto; }
.btn-icon svg { width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.btn-pdf-pontualidade, .btn-modulo-link { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:36px; border-radius:8px; padding:8px 14px; background:linear-gradient(135deg,#fff,#f8fafc); color:var(--blue); border:1px solid #d6deea; border-left:3px solid var(--orange); font-weight:700; font-size:12px; box-shadow:0 8px 16px rgba(6,36,92,.1); transition:transform .2s,box-shadow .2s,background .2s; white-space:nowrap; cursor:pointer; font-family:inherit; text-decoration:none; }
.btn-pdf-pontualidade:hover:not(:disabled), .btn-modulo-link:hover { background:linear-gradient(135deg,#fff7ed,#fff); transform:translateY(-1px); box-shadow:0 10px 20px rgba(255,107,0,.14); }
.btn-pdf-pontualidade:disabled { opacity:.72; cursor:wait; }
.pdf-status { font-size:11px; color:var(--muted); font-weight:600; margin:0; }
.kpi-container { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:12px; }
.kpi-card { background:#fff; border-radius:6px; padding:10px 14px; border:1px solid var(--border); box-shadow:0 1px 3px rgba(0,0,0,.01); }
.kpi-card.highlight { border-left:4px solid var(--icv); background:linear-gradient(to right,#f0fdfa,#fff); }
.kpi-title { font-size:11px; color:var(--muted); font-weight:600; margin-bottom:2px; text-transform:uppercase; }
.kpi-value { font-size:18px; font-weight:bold; color:var(--text); }
.kpi-card.highlight .kpi-value { color:var(--icv); font-size:22px; }
.kpi-sub { margin-top:4px; font-size:11px; color:var(--muted); font-weight:600; }
.chart-card, .table-card { background:#fff; border:1px solid var(--border); border-radius:6px; box-shadow:0 8px 24px rgba(16,24,40,.05); }
.chart-header { padding:12px 14px 0; display:flex; justify-content:space-between; align-items:center; }
.chart-title { font-size:14px; font-weight:800; color:var(--blue); }
.chart-container { height:320px; padding:8px 12px 12px; }
.table-card-header { padding:12px 14px; font-weight:800; color:var(--blue); border-bottom:1px solid var(--border); }
.table-wrapper { overflow:auto; max-height:360px; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th, td { padding:10px 12px; border-bottom:1px solid #eef2f7; text-align:center; }
th { background:#f8fafc; color:var(--muted); font-size:11px; text-transform:uppercase; position:sticky; top:0; }
td:first-child, th:first-child { text-align:left; }
.icv-cell { color:var(--icv); font-weight:700; }
.no-data { text-align:center; color:var(--muted); padding:24px; }
@media(max-width:1100px){
    .kpi-container{grid-template-columns:repeat(2,minmax(0,1fr));}
    .icv-title-art img {
        width: min(340px, 84vw) !important;
        height: 38px !important;
        max-height: 38px !important;
    }
}
@media(max-width:560px){
    .icv-title-art img {
        width: min(290px, 88vw) !important;
        height: 34px !important;
        max-height: 34px !important;
    }
}

@media (max-width: 900px) {
  body {
    min-height: 100vh !important;
    height: auto !important;
    overflow-x: hidden !important;
    overflow-y: auto !important;
  }
  .main-content { flex: none !important; display: block !important; overflow: visible !important; }
  .content-body { overflow: visible !important; }
  .table-wrapper { max-height: none !important; overflow-y: visible !important; -webkit-overflow-scrolling: touch; }
}
@media (max-width: 700px) {
  body { background: linear-gradient(180deg, #f5f7fb 0%, #eef2f9 100%) !important; }
  .header {
    grid-template-columns: 1fr !important;
    gap: 8px !important;
    padding: 10px 14px !important;
    text-align: center !important;
    position: sticky; top: 0; z-index: 20;
    padding-top: calc(10px + env(safe-area-inset-top)) !important;
    background: rgba(255,255,255,.92) !important;
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    box-shadow: 0 6px 18px rgba(6,36,92,.08) !important;
  }
  .header > a:first-child { justify-self: center !important; }
  .header-actions { justify-self: center !important; justify-content: center !important; width: 100%; }
  .kpi-container { grid-template-columns: repeat(2, minmax(0,1fr)) !important; }
  .kpi-card, .chart-card, .table-card, .toolbar {
    border-radius: 16px !important;
    box-shadow: 0 10px 26px rgba(6,36,92,.08) !important;
  }
  .kpi-card { position: relative; overflow: hidden; }
  .kpi-card::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--orange), var(--icv));
    opacity: .9;
  }
  .chart-container { height: 240px !important; padding: 8px !important; }
  .btn-portal, .btn-pdf-pontualidade, .btn-modulo-link { min-height: 44px !important; border-radius: 12px !important; }
}
@media (max-width: 430px) {
  .kpi-container { grid-template-columns: repeat(2, minmax(0,1fr)) !important; gap: 10px !important; }
  .kpi-card { padding: 12px 10px !important; }
  .kpi-title { font-size: 10px !important; }
  .kpi-value { font-size: 16px !important; }
  .kpi-card.highlight .kpi-value { font-size: 19px !important; }
  .chart-container { height: 200px !important; }
}
@media (max-width: 700px) {
  .content-body {
    padding-left: calc(12px + env(safe-area-inset-left)) !important;
    padding-right: calc(12px + env(safe-area-inset-right)) !important;
  }
  .sidebar.portal-filters-bar {
    grid-template-columns: repeat(2, minmax(0,1fr)) !important;
    gap: 10px 12px !important;
    padding: 14px 16px !important;
    border-radius: 16px !important;
    box-shadow: 0 10px 26px rgba(6,36,92,.08) !important;
    position: relative;
    overflow: hidden;
  }
  .sidebar.portal-filters-bar::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--orange), var(--icv));
    opacity: .9;
  }
  .filter-group label { font-size: 11px !important; }
  .filter-select { font-size: 14px !important; }
  .table-card { overflow: hidden; }
  .table-wrapper table { font-size: 11px !important; }
  .table-wrapper th, .table-wrapper td { padding: 8px 6px !important; }
  body { -webkit-overflow-scrolling: touch; }
}
/* Fim modernizacao iPhone */
</style>
<script src="../assets/js/loading.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet" href="../assets/css/portal-senha.css">
<link rel="stylesheet" href="../assets/css/portal-titulos.css?v=20260702g">
<link rel="stylesheet" href="../assets/css/portal-brand.css">
<link rel="stylesheet" href="../assets/css/portal-header.css?v=20260702g">
<link rel="stylesheet" href="../assets/css/portal-session.css">
<link rel="stylesheet" href="../assets/css/portal-filtros.css">
<script type="module" src="../assets/js/auth.js"></script>
<script src="../assets/js/portal-senha.js" defer></script>
</head>
<body>
<div class="header">
    <a class="portal-brand-mark" href="../index.html" aria-label="Portal CIOP TCGL Operações"><img class="portal-brand-art" src="../assets/img/titulo-portal-ciop.png" alt="Portal CIOP"><span class="portal-brand-meta">TCGL · Operações</span></a>
    <div class="icv-title-wrap">
        <h1 class="icv-title-art" aria-label="Índice de Cumprimento de Viagem - ICV">
            <img src="../assets/img/icv-titulo.png?v=20260702h" alt="Cumprimento de Viagem - ICV">
        </h1>
        <div class="subtitle" id="dashboardSubtitle">CIOP / TCGL</div>
    </div>
    <div class="header-actions">
        <div class="ciop-session" aria-label="Sessão do usuário">
            <span id="usuarioLogado" class="ciop-session-user">Usuário</span>
            <span id="perfilUsuario" class="ciop-session-cargo" hidden></span>
            <button onclick="logout()" class="btn-logout" type="button">Sair</button>
        </div>
        <a href="https://www.tcgrandelondrina.com.br/" target="_blank" rel="noopener" class="logo-tcgl-link" aria-label="Site TCGL">
            <img class="logo-tcgl" src="../assets/img/LOGO_TCGL-removebg-preview.png" alt="TCGL">
        </a>
    </div>
</div>
<div class="main-content">
    <div class="content-body">
        <div class="toolbar">
            <div class="toolbar-actions">
                <a href="../index.html" class="btn-portal" aria-label="Voltar ao portal">
                    <span class="btn-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></span>
                    <span>Portal</span>
                </a>
                <button type="button" class="btn-pdf-pontualidade" id="btnExportarPdf" disabled aria-label="Exportar PDF">
                    <span class="btn-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/></svg></span>
                    <span>PDF</span>
                </button>
                <a href="pontualidade.html" class="btn-modulo-link" aria-label="Ir para Pontualidade IPV">
                    <span class="btn-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 6v6l4 2"/><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg></span>
                    <span>IPV</span>
                </a>
            </div>
        </div>
        <p class="pdf-status" id="pdfStatus" hidden></p>

        <div class="kpi-container">
            <div class="kpi-card highlight">
                <div class="kpi-title">Melhor mês de ICV</div>
                <div class="kpi-value" id="kpiMelhorMes">-</div>
                <div class="kpi-sub" id="kpiMelhorMesLabel">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Viagens programadas</div>
                <div class="kpi-value" id="kpiViagProg">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Viagens realizadas</div>
                <div class="kpi-value" id="kpiViagens">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Supressão</div>
                <div class="kpi-value" id="kpiSupressao">-</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">% Supressão</div>
                <div class="kpi-value" id="kpiPctSupressao">-</div>
            </div>
        </div>

        <div class="sidebar portal-filters-bar">
            <div class="filter-group">
                <label for="anoFilter">Filtrar por Ano</label>
                <select id="anoFilter" class="filter-select" onchange="updateFilters('ano')"><option value="todos">Todos os Anos</option></select>
            </div>
            <div class="filter-group">
                <label for="trimestreFilter">Filtrar por Trimestre</label>
                <select id="trimestreFilter" class="filter-select" onchange="updateFilters('trimestre')">
                    <option value="todos">Todos os Trimestres</option>
                    <option value="Q1">1º Trimestre (Jan - Mar)</option>
                    <option value="Q2">2º Trimestre (Abr - Jun)</option>
                    <option value="Q3">3º Trimestre (Jul - Set)</option>
                    <option value="Q4">4º Trimestre (Out - Dez)</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="mesFilter">Filtrar por Mês</label>
                <select id="mesFilter" class="filter-select" onchange="updateFilters('mes')">
                    <option value="todos">Todos os Meses</option>
                    <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
                    <option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option>
                    <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
                    <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="diaFilter">Filtrar por Dia</label>
                <select id="diaFilter" class="filter-select" onchange="updateFilters('dia')"><option value="todos">Todos os Dias</option></select>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-header"><div class="chart-title" id="chartDynamicTitle">ICV</div></div>
            <div class="chart-container"><canvas id="barChartCanvas"></canvas></div>
        </div>

        <div class="table-card">
            <div class="table-card-header"><span id="tableDynamicTitle">Detalhamento dos Dados</span></div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th id="thColPeriodo">Período</th>
                            <th>Viag. Prog</th>
                            <th>Viagens</th>
                            <th>Supressão</th>
                            <th>ICV</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script type="module">
import { iniciarIcvDashboard } from "../assets/js/icv-dashboard.js?v=20260702i";
import { exportarPdfIcv } from "../assets/js/icv-relatorio-export.js?v=20260702d";
window.exportarPdfIcv = exportarPdfIcv;
window.onload = () => window.portalAguardarUsuario?.(iniciarIcvDashboard);
</script>
</body>
</html>
