<!doctype html>
<html lang="pt-BR">
<head>
<script>document.documentElement.classList.add("portal-auth-pending");</script>
<style id="portalAuthBootStyle">.portal-auth-pending body > :not(#portalLoadingOverlay){visibility:hidden!important}</style>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gerenciador de Pátio | Portal CIOP</title>
<style>
:root{--blue:#06245c;--blue2:#0b3a8a;--orange:#ff6b00;--bg:#f5f7fb;--border:#dfe5ef;--text:#101828;--muted:#667085;--red:#dc2626;--white:#fff;--green:#15803d;--amber:#b45309}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--white);display:grid;grid-template-columns:minmax(180px,1fr) auto minmax(280px,1fr);gap:16px;align-items:center;padding:8px 20px;border-bottom:1px solid #e8edf6}
.header > a:first-child.portal-brand-mark{justify-self:start}
.logo-ciop{height:42px;object-fit:contain}.logo-tcgl{height:46px;object-fit:contain}
.title-wrap{justify-self:center;text-align:center}
.page-title{margin:0;color:var(--blue);font-size:24px;font-weight:800;letter-spacing:-.02em}
.header-subtitle{margin-top:4px;color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.header-actions{justify-self:end;display:flex;align-items:center;gap:10px}
.ciop-session{display:flex;align-items:center;gap:6px;max-width:260px;padding:4px 8px;border:1px solid rgba(6,36,92,.12);border-radius:6px;background:var(--white);color:var(--blue);font-size:11px}
.ciop-session-user{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.ciop-session-profile{color:var(--muted);font-weight:600}
.ciop-session .btn-logout{background:var(--red);color:#fff;border:none;border-radius:5px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer}
.container{max-width:min(1680px,96vw);margin:24px auto 40px;padding:0 20px;flex:1;width:100%}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-portal,.btn-secondary{display:inline-flex;align-items:center;gap:8px;min-height:44px;text-decoration:none;border-radius:10px;font-size:14px;font-weight:800;padding:8px 14px;background:var(--blue);color:#fff;border:none;cursor:pointer;font-family:inherit}
.btn-portal:hover{background:var(--blue2)}
.btn-secondary{background:#e8edf6;color:var(--blue)}
.btn-secondary:hover{background:#dde6f5}
.btn-icon{display:inline-flex;width:16px;height:16px;flex:0 0 auto}
.btn-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.patio-stats{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.patio-stat{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:999px;background:var(--white);border:1px solid var(--border);font-size:12px;font-weight:800;color:var(--muted);box-shadow:0 6px 16px rgba(16,24,40,.05)}
.patio-stat-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.patio-stat-dot.st-operando{background:var(--green)}
.patio-stat-dot.st-reserva{background:var(--amber)}
.patio-stat-dot.st-manutencao{background:var(--red)}
.patio-stat-dot.st-bloqueado{background:#475467}
.patio-stat-dot.st-vazio{background:#cbd2de}
.patio-stat b{color:var(--text)}

.patio-zone{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:18px 20px 20px;margin-bottom:18px;box-shadow:0 10px 26px rgba(16,24,40,.05)}
.patio-zone-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.patio-zone-title-wrap{display:flex;align-items:center;gap:10px;min-width:0}
.patio-zone-dot{width:12px;height:12px;border-radius:4px;flex:0 0 auto}
.zone-tiete .patio-zone-dot{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.zone-galpao .patio-zone-dot{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.zone-reserva .patio-zone-dot{background:linear-gradient(135deg,var(--orange),#c2540a)}
.patio-zone-title{margin:0;font-size:15px;font-weight:900;color:var(--blue);text-transform:uppercase;letter-spacing:.03em}
.patio-zone-sub{margin:2px 0 0;font-size:11.5px;color:var(--muted);font-weight:600}
.patio-zone-count{font-size:11px;font-weight:800;color:var(--muted);white-space:nowrap}
.patio-zone-add{border:1px dashed rgba(6,36,92,.25);background:#f8fbff;color:var(--blue);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap}
.patio-zone-add:hover{background:#eef4ff}

.patio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px}
.patio-vaga{position:relative;border-radius:14px;border:1.5px solid var(--border);background:#fbfcfe;padding:10px 8px 8px;min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center;cursor:pointer;transition:.15s;overflow:hidden}
.patio-vaga:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(16,24,40,.1)}
.patio-vaga-num{position:absolute;top:5px;left:7px;font-size:9px;font-weight:800;color:var(--muted)}
.patio-vaga-prefixo{font-size:15px;font-weight:900;color:var(--text);word-break:break-word}
.patio-vaga-status-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.patio-vaga-empty{font-size:11px;color:#b7bfcc;font-weight:700}
.patio-vaga.st-operando{background:#ecfdf3;border-color:#bbf0cf}
.patio-vaga.st-operando .patio-vaga-status-label{color:var(--green)}
.patio-vaga.st-reserva{background:#fffaeb;border-color:#fde3ad}
.patio-vaga.st-reserva .patio-vaga-status-label{color:var(--amber)}
.patio-vaga.st-manutencao{background:#fef2f2;border-color:#fecaca}
.patio-vaga.st-manutencao .patio-vaga-status-label{color:var(--red)}
.patio-vaga.st-bloqueado{background:repeating-linear-gradient(135deg,#eef0f3,#eef0f3 6px,#e3e6eb 6px,#e3e6eb 12px);border-color:#c7ccd6;color:#8a93a3}
.patio-vaga.st-bloqueado .patio-vaga-prefixo,.patio-vaga.st-bloqueado .patio-vaga-status-label{color:#8a93a3}
.patio-vaga-remove{position:absolute;top:3px;right:4px;width:16px;height:16px;border-radius:50%;border:none;background:rgba(16,24,40,.08);color:var(--muted);font-size:10px;line-height:16px;cursor:pointer;display:none;align-items:center;justify-content:center}
.patio-vaga:hover .patio-vaga-remove{display:flex}
.patio-vaga-remove:hover{background:var(--red);color:#fff}

.patio-empty-zone{padding:24px;text-align:center;color:var(--muted);font-size:12.5px;font-weight:700}

.patio-editor-backdrop{position:fixed;inset:0;background:rgba(16,24,40,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.patio-editor-backdrop[hidden]{display:none}
.patio-editor{width:min(380px,100%);background:#fff;border-radius:18px;box-shadow:0 30px 60px rgba(16,24,40,.3);padding:20px}
.patio-editor h3{margin:0 0 4px;color:var(--blue);font-size:16px}
.patio-editor p{margin:0 0 16px;color:var(--muted);font-size:12px;font-weight:700}
.patio-editor label{display:block;margin:10px 0 5px;color:var(--muted);font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
.patio-editor input,.patio-editor select,.patio-editor textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font:inherit;font-size:14px;outline:none}
.patio-editor input:focus,.patio-editor select:focus,.patio-editor textarea:focus{border-color:var(--blue)}
.patio-editor textarea{min-height:60px;resize:vertical}
.patio-editor-status-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:2px}
.patio-status-opt{border:1.5px solid var(--border);border-radius:9px;padding:8px;font-size:11.5px;font-weight:800;cursor:pointer;text-align:center;background:#fff;color:var(--muted)}
.patio-status-opt.active{border-color:var(--blue);background:#eef4ff;color:var(--blue)}
.patio-editor-actions{display:flex;gap:8px;margin-top:18px}
.patio-editor-actions .btn-portal,.patio-editor-actions .btn-secondary{flex:1;justify-content:center;min-height:42px}
.patio-editor-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;border:none;background:#eef2f7;color:var(--blue);cursor:pointer;font-size:14px}
.patio-editor-meta{margin-top:12px;font-size:10.5px;color:#98a2b3;font-weight:700}

.patio-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#101828;color:#fff;padding:10px 18px;border-radius:10px;font-size:12.5px;font-weight:700;z-index:1100;box-shadow:0 12px 28px rgba(16,24,40,.3);opacity:0;pointer-events:none;transition:opacity .25s ease}
.patio-toast.show{opacity:1}

.page-footer{padding:14px;text-align:center;color:var(--muted);font-size:11px;font-weight:700;border-top:1px solid var(--border);background:var(--white)}

@media(max-width:720px){.header{grid-template-columns:1fr;text-align:center}}
@media (max-width: 720px) {
  body { background: linear-gradient(180deg, #f5f7fb 0%, #eef2f9 100%) !important; }
  .header {
    position: sticky; top: 0; z-index: 20;
    padding-top: calc(10px + env(safe-area-inset-top)) !important;
    padding-left: calc(14px + env(safe-area-inset-left)) !important;
    padding-right: calc(14px + env(safe-area-inset-right)) !important;
    background: rgba(255,255,255,.92) !important;
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);

  }
  .container { padding: 0 14px !important; margin: 16px auto 28px !important; }
  .patio-grid{grid-template-columns:repeat(auto-fill,minmax(92px,1fr)) !important;gap:8px !important}
  .btn-portal,.btn-secondary { min-height: 44px !important; border-radius: 12px !important; }
}

<body data-require-perfis="Administrador,Supervisor,Analista">
<div class="body-bg-wall" aria-hidden="true"></div>
<div class="body-bg-stain" aria-hidden="true"></div>
<header class="header">
    <a class="portal-brand-mark" href="../index.html" aria-label="Portal CIOP TCGL Operações"><img class="portal-brand-art" src="../assets/img/titulo-portal-ciop.png" alt="Portal CIOP"><span class="portal-brand-meta">TCGL · Operações</span></a>
    <div class="title-wrap">
        <h1 class="page-title">Gerenciador de Pátio</h1>
        <div class="header-subtitle">Garagem TCGL · R. Tietê</div>
    </div>
    <div class="header-actions">
        <button class="dk-theme-toggle" type="button" id="dkThemeToggle" aria-label="Alternar tema claro/escuro"><span class="dk-icon-moon">&#9789;</span><span class="dk-icon-sun">&#9728;</span></button>
        <div class="ciop-session">
            <span class="ciop-session-user" id="usuarioLogado">Usuário</span>
            <span class="ciop-session-cargo" id="perfilUsuario" hidden></span>
            <button class="btn-logout" type="button" onclick="logout()">Sair</button>
        </div>
        <a href="https://www.tcgrandelondrina.com.br/" target="_blank" rel="noopener"><img class="logo-tcgl" src="../assets/img/LOGO_TCGL-removebg-preview.png" alt="TCGL"></a>
    </div>
</header>

<main class="container">
    <div class="toolbar">
        <div class="toolbar-left">
            <a class="btn-portal" href="../index.html"><span class="btn-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></span>Portal</a>
            <button class="btn-secondary" type="button" id="btnAtualizar"><span class="btn-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></span>Atualizar</button>
        </div>
        <div class="patio-stats" id="patioStats"></div>
    </div>

    <div id="patioZonas"></div>
</main>

<footer class="page-footer">Portal CIOP · Gerenciador de Pátio · TCGL</footer>

<div class="patio-editor-backdrop" id="patioEditorBackdrop" hidden>
    <div class="patio-editor">
        <button class="patio-editor-close" type="button" id="patioEditorClose" aria-label="Fechar">✕</button>
        <h3 id="patioEditorTitle">Vaga</h3>
        <p id="patioEditorSub">Zona · Vaga</p>

        <label for="patioEditorPrefixo">Prefixo do veículo</label>
        <input type="text" id="patioEditorPrefixo" list="frotaList" placeholder="Ex.: 3021" autocomplete="off">
        <datalist id="frotaList"></datalist>

        <label>Status</label>
        <div class="patio-editor-status-grid" id="patioEditorStatus">
            <button type="button" class="patio-status-opt" data-status="operando">Operando</button>
            <button type="button" class="patio-status-opt" data-status="reserva">Reserva</button>
            <button type="button" class="patio-status-opt" data-status="manutencao">Manutenção</button>
            <button type="button" class="patio-status-opt" data-status="bloqueado">Bloqueada</button>
        </div>

        <label for="patioEditorObs">Observação (opcional)</label>
        <textarea id="patioEditorObs" placeholder="Ex.: aguardando peça, saída 06h..."></textarea>

        <div class="patio-editor-actions">
            <button class="btn-secondary" type="button" id="patioEditorLimpar">Esvaziar vaga</button>
            <button class="btn-portal" type="button" id="patioEditorSalvar">Salvar</button>
        </div>
        <p class="patio-editor-meta" id="patioEditorMeta"></p>
    </div>
</div>

<div class="patio-toast" id="patioToast"></div>

<script>
(function(){
  var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfS5gLXELey_NzJIWOscQqUnOlAyg4epUUXNM2EZCAEvDeTtd6h246ePExsGi4_0HmzQ/exec";

  var ZONAS = [
    { id: 'tiete',    nome: 'Fileira R. Tietê',            sub: 'Fila da frente, saída rápida pela rua',        classe: 'zone-tiete',    padrao: 12 },
    { id: 'galpao',   nome: 'Fileira Galpão',               sub: 'Encostada no prédio principal',                classe: 'zone-galpao',   padrao: 10 },
    { id: 'reserva',  nome: 'Fila Duque de Caxias · Reserva', sub: 'Fila compacta, frota reserva/manutenção',    classe: 'zone-reserva',  padrao: 20 }
  ];

  var STATUS_LABEL = { vazio:'Vazia', operando:'Operando', reserva:'Reserva', manutencao:'Manutenção', bloqueado:'Bloqueada' };

  var estado = {};
  var vagaAtual = null;
  var frotaCarregada = false;

  function toast(msg){
    var el = document.getElementById('patioToast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function(){ el.classList.remove('show'); }, 2600);
  }

  function chaveVaga(zona, vaga){ return zona + '#' + vaga; }

  function garantirEstrutura(){
    ZONAS.forEach(function(z){
      for (var i = 1; i <= z.padrao; i++){
        var k = chaveVaga(z.id, i);
        if (!estado[k]){
          estado[k] = { zona: z.id, vaga: i, prefixo: '', status: 'vazio', obs: '', atualizadoEm: '', atualizadoPor: '' };
        }
      }
    });
  }

  function carregarFrota(){
    if (frotaCarregada || !window.FROTA_PATIO) return;
    frotaCarregada = true;
    var dl = document.getElementById('frotaList');
    var html = '';
    window.FROTA_PATIO.forEach(function(v){
      html += '<option value="' + v.veiculo + '">' + (v.rotulo || '') + '</option>';
    });
    dl.innerHTML = html;
  }

  function usuarioAtual(){
    var el = document.getElementById('usuarioLogado');
    return (el && el.textContent && el.textContent.trim() && el.textContent.trim() !== 'Usuário') ? el.textContent.trim() : '';
  }

  function renderStats(){
    var cont = { vazio:0, operando:0, reserva:0, manutencao:0, bloqueado:0 };
    Object.keys(estado).forEach(function(k){ cont[estado[k].status] = (cont[estado[k].status]||0) + 1; });
    var wrap = document.getElementById('patioStats');
    wrap.innerHTML = ['operando','reserva','manutencao','bloqueado','vazio'].map(function(s){
      return '<span class="patio-stat"><span class="patio-stat-dot st-' + s + '"></span><b>' + cont[s] + '</b> ' + STATUS_LABEL[s].toLowerCase() + '</span>';
    }).join('');
  }

  function renderZonas(){
    var wrap = document.getElementById('patioZonas');
    var html = '';
    ZONAS.forEach(function(z){
      var vagas = Object.keys(estado).filter(function(k){ return estado[k].zona === z.id; })
        .map(function(k){ return estado[k]; })
        .sort(function(a,b){ return a.vaga - b.vaga; });

      html += '<section class="patio-zone ' + z.classe + '">' +
        '<div class="patio-zone-head">' +
          '<div class="patio-zone-title-wrap">' +
            '<span class="patio-zone-dot"></span>' +
            '<div><h2 class="patio-zone-title">' + z.nome + '</h2><p class="patio-zone-sub">' + z.sub + '</p></div>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:10px">' +
            '<span class="patio-zone-count">' + vagas.length + ' vagas</span>' +
            '<button type="button" class="patio-zone-add" data-zona="' + z.id + '">+ vaga</button>' +
          '</div>' +
        '</div>' +
        '<div class="patio-grid">';

      if (!vagas.length){
        html += '<div class="patio-empty-zone">Nenhuma vaga cadastrada nesta fileira ainda.</div>';
      } else {
        vagas.forEach(function(v){
          html += '<div class="patio-vaga st-' + v.status + '" data-zona="' + v.zona + '" data-vaga="' + v.vaga + '">' +
            '<span class="patio-vaga-num">' + v.vaga + '</span>' +
            (v.status === 'vazio'
              ? '<span class="patio-vaga-empty">vazia</span>'
              : '<span class="patio-vaga-prefixo">' + (v.prefixo || '—') + '</span><span class="patio-vaga-status-label">' + STATUS_LABEL[v.status] + '</span>') +
            '<button type="button" class="patio-vaga-remove" data-zona="' + v.zona + '" data-vaga="' + v.vaga + '" title="Remover vaga" aria-label="Remover vaga">✕</button>' +
          '</div>';
        });
      }

      html += '</div></section>';
    });
    wrap.innerHTML = html;
  }

  function render(){
    renderStats();
    renderZonas();
  }

  function abrirEditor(zona, vaga){
    var k = chaveVaga(zona, vaga);
    var v = estado[k];
    if (!v) return;
    vagaAtual = v;
    carregarFrota();

    var zonaInfo = ZONAS.filter(function(z){ return z.id === zona; })[0];
    document.getElementById('patioEditorTitle').textContent = 'Vaga ' + vaga;
    document.getElementById('patioEditorSub').textContent = (zonaInfo ? zonaInfo.nome : zona);
    document.getElementById('patioEditorPrefixo').value = v.prefixo || '';
    document.querySelectorAll('.patio-status-opt').forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.status === v.status);
    });
    document.getElementById('patioEditorObs').value = v.obs || '';
    document.getElementById('patioEditorMeta').textContent = v.atualizadoEm
      ? ('Última atualização: ' + v.atualizadoEm + (v.atualizadoPor ? ' · ' + v.atualizadoPor : ''))
      : 'Ainda sem atualização registrada.';

    document.getElementById('patioEditorBackdrop').hidden = false;
    document.getElementById('patioEditorPrefixo').focus();
  }

  function fecharEditor(){
    document.getElementById('patioEditorBackdrop').hidden = true;
    vagaAtual = null;
  }

  function statusSelecionado(){
    var ativo = document.querySelector('.patio-status-opt.active');
    return ativo ? ativo.dataset.status : 'operando';
  }

  function salvarVagaAtual(limpar){
    if (!vagaAtual) return;
    var prefixo = limpar ? '' : document.getElementById('patioEditorPrefixo').value.trim();
    var status = limpar ? 'vazio' : (prefixo ? statusSelecionado() : 'vazio');
    var obs = limpar ? '' : document.getElementById('patioEditorObs').value.trim();
    var agora = new Date().toLocaleString('pt-BR');
    var quem = usuarioAtual();

    vagaAtual.prefixo = prefixo;
    vagaAtual.status = status;
    vagaAtual.obs = obs;
    vagaAtual.atualizadoEm = agora;
    vagaAtual.atualizadoPor = quem;

    render();
    fecharEditor();
    enviarAtualizacao(vagaAtual);
  }

  function removerVaga(zona, vaga){
    var k = chaveVaga(zona, vaga);
    var v = estado[k];
    if (!v) return;
    if (v.status !== 'vazio' && !confirm('Esta vaga não está vazia. Remover mesmo assim?')) return;
    delete estado[k];
    render();
    enviarRemocao(zona, vaga);
  }

  function adicionarVaga(zonaId){
    var numerosExistentes = Object.keys(estado)
      .filter(function(k){ return estado[k].zona === zonaId; })
      .map(function(k){ return estado[k].vaga; });
    var proximo = numerosExistentes.length ? Math.max.apply(null, numerosExistentes) + 1 : 1;
    var k = chaveVaga(zonaId, proximo);
    estado[k] = { zona: zonaId, vaga: proximo, prefixo: '', status: 'vazio', obs: '', atualizadoEm: '', atualizadoPor: '' };
    render();
    enviarAtualizacao(estado[k]);
  }

  function configurada(){
    return APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf('COLE_AQUI') !== 0;
  }

  function enviarAtualizacao(v){
    if (!configurada()) return;
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ acao: 'salvar', zona: v.zona, vaga: v.vaga, prefixo: v.prefixo, status: v.status, obs: v.obs, atualizadoPor: v.atualizadoPor })
    }).catch(function(){ toast('Falha ao sincronizar. A alteração ficou só neste navegador.'); });
  }

  function enviarRemocao(zona, vaga){
    if (!configurada()) return;
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ acao: 'remover', zona: zona, vaga: vaga })
    }).catch(function(){ toast('Falha ao sincronizar a remoção.'); });
  }

  function carregarEstado(){
    garantirEstrutura();
    render();
    if (!configurada()){
      toast('Assistente de pátio ainda não conectado ao servidor — alterações ficam só neste navegador.');
      return;
    }
    fetch(APPS_SCRIPT_URL, { method: 'GET', cache: 'no-store' })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data && data.vagas && data.vagas.length){
          data.vagas.forEach(function(v){
            var k = chaveVaga(v.zona, Number(v.vaga));
            estado[k] = { zona: v.zona, vaga: Number(v.vaga), prefixo: v.prefixo || '', status: v.status || 'vazio', obs: v.obs || '', atualizadoEm: v.atualizadoEm || '', atualizadoPor: v.atualizadoPor || '' };
          });
          render();
        } else {
          Object.keys(estado).forEach(function(k){ enviarAtualizacao(estado[k]); });
        }
      })
      .catch(function(){ toast('Não foi possível carregar o pátio do servidor. Mostrando dados locais.'); });
  }

  document.getElementById('patioZonas').addEventListener('click', function(ev){
    var addBtn = ev.target.closest('.patio-zone-add');
    if (addBtn){ adicionarVaga(addBtn.dataset.zona); return; }

    var removeBtn = ev.target.closest('.patio-vaga-remove');
    if (removeBtn){ ev.stopPropagation(); removerVaga(removeBtn.dataset.zona, Number(removeBtn.dataset.vaga)); return; }

    var vagaEl = ev.target.closest('.patio-vaga');
    if (vagaEl){ abrirEditor(vagaEl.dataset.zona, Number(vagaEl.dataset.vaga)); }
  });

  document.getElementById('patioEditorStatus').addEventListener('click', function(ev){
    var btn = ev.target.closest('.patio-status-opt');
    if (!btn) return;
    document.querySelectorAll('.patio-status-opt').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  });

  document.getElementById('patioEditorClose').addEventListener('click', fecharEditor);
  document.getElementById('patioEditorBackdrop').addEventListener('click', function(ev){
    if (ev.target === this) fecharEditor();
  });
  document.getElementById('patioEditorSalvar').addEventListener('click', function(){ salvarVagaAtual(false); });
  document.getElementById('patioEditorLimpar').addEventListener('click', function(){ salvarVagaAtual(true); });
  document.getElementById('btnAtualizar').addEventListener('click', carregarEstado);

  carregarEstado();
})();
</script>
</body>
</html>
