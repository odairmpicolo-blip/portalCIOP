/* Fim modernizacao iPhone */

/* ===== Redesign iOS26 Liquid Glass (mobile/app nativo) =====
   Suporta escuro (padrão) e claro (html.native-light), sincronizado
   pelo shell nativo. Fontes ampliadas para leitura confortável. */
@media (max-width:720px){
  .body-bg-wall,
  .body-bg-stain{
    display:none !important;
  }
  :root{
    --jewel-1:#7a5cff;
    --jewel-2:#c04fd6;
    --jewel-shadow:0 10px 26px -8px rgba(122,92,255,.65);

    --glass-bg:rgba(255,255,255,.08);
    --glass-bg-strong:rgba(255,255,255,.13);
    --glass-border:rgba(255,255,255,.16);
    --glass-blur:blur(30px) saturate(180%);
    --glass-shadow:0 20px 40px -18px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.18);

    --ink:#fff;
    --ink-soft:rgba(255,255,255,.6);
    --ink-faint:rgba(255,255,255,.48);
  }

  html.native-light{
    --glass-bg:rgba(255,255,255,.6);
    --glass-bg-strong:rgba(255,255,255,.8);
    --glass-border:rgba(30,20,70,.10);
    --glass-shadow:0 16px 34px -16px rgba(40,25,90,.22), inset 0 1px 0 rgba(255,255,255,.75);

    --ink:#18182a;
    --ink-soft:rgba(24,24,42,.62);
    --ink-faint:rgba(24,24,42,.5);
  }

  body{
    background:
      radial-gradient(circle at 15% 8%, rgba(122,92,255,.4) 0%, transparent 40%),
      radial-gradient(circle at 90% 15%, rgba(255,110,180,.3) 0%, transparent 38%),
      radial-gradient(circle at 20% 60%, rgba(60,180,255,.26) 0%, transparent 42%),
      radial-gradient(circle at 85% 78%, rgba(255,170,60,.2) 0%, transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(80,255,190,.16) 0%, transparent 45%),
      #0d0e14 !important;
    color:var(--ink) !important;
  }
  html.native-light body{
    background:
      radial-gradient(circle at 15% 8%, rgba(122,92,255,.3) 0%, transparent 40%),
      radial-gradient(circle at 90% 15%, rgba(255,110,180,.24) 0%, transparent 38%),
      radial-gradient(circle at 20% 60%, rgba(60,180,255,.2) 0%, transparent 42%),
      radial-gradient(circle at 85% 78%, rgba(255,170,60,.18) 0%, transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(80,255,190,.16) 0%, transparent 45%),
      #f2effa !important;
  }

  .header{display:none !important;}

  .container{
    max-width:none !important;
    margin:0 !important;
    padding:calc(14px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-left)) 28px calc(14px + env(safe-area-inset-right)) !important;
  }
  html.native-embedded .container{padding-top:14px !important;}

  .toolbar{width:100%;}
  .btn-portal{
    width:100% !important;
    justify-content:center !important;
    background:linear-gradient(135deg, var(--jewel-1), var(--jewel-2)) !important;
    box-shadow:var(--jewel-shadow) !important;
    min-height:46px !important;
    border-radius:14px !important;
    font-size:15px !important;
  }

  .intro{
    background:var(--glass-bg) !important;
    backdrop-filter:var(--glass-blur) !important;
    -webkit-backdrop-filter:var(--glass-blur) !important;
    border:1px solid var(--glass-border) !important;
    box-shadow:var(--glass-shadow) !important;
  }
  .intro h2{color:var(--ink) !important;font-size:18px !important;}
  .intro p{color:var(--ink-faint) !important;font-size:13.5px !important;}

  .card{
    background:var(--glass-bg) !important;
    backdrop-filter:var(--glass-blur) !important;
    -webkit-backdrop-filter:var(--glass-blur) !important;
    border:1px solid var(--glass-border) !important;
    box-shadow:var(--glass-shadow) !important;
  }
  .card-figure{
    background:var(--glass-bg-strong) !important;
    color:#fff !important;
    background:linear-gradient(135deg, var(--jewel-1), var(--jewel-2)) !important;
  }
  .card-title{color:var(--ink) !important;font-size:17px !important;}
  .card-desc{color:var(--ink-faint) !important;font-size:13.5px !important;}
  .card-btn{
    background:linear-gradient(135deg, var(--jewel-1), var(--jewel-2)) !important;
    font-size:12px !important;
  }
  .badge-soon{background:var(--glass-bg-strong) !important;color:var(--ink-faint) !important;}
  .page-footer{display:none !important;}
}

/* ===== Fundo padrao-parede (tracos azul degrade) + mancha julho + vidro iOS 26 (desktop/portal web) ===== */
@media (min-width:721px){
  body{
    background: transparent !important;
  }
  .body-bg-wall{
    position: fixed;
    inset: 0;
    z-index: -3;
    background-image:url('../assets/img/portal-bg-onibus.jpg?v=20260716a');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
  }
  .body-bg-stain{
    position: fixed;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    background:linear-gradient(180deg, rgba(6,20,50,.30) 0%, rgba(6,20,50,.55) 100%);
  }
  .header{
    background: rgba(255,255,255,.7) !important;
    backdrop-filter: blur(18px) saturate(200%);
    -webkit-backdrop-filter: blur(18px) saturate(200%);
    border-bottom: none !important;
    box-shadow: 0 8px 24px -18px rgba(20,20,40,.35) !important;
  }
  .intro,
  .card{
    background: rgba(255,255,255,.5) !important;
    backdrop-filter: blur(20px) saturate(190%) !important;
    -webkit-backdrop-filter: blur(20px) saturate(190%) !important;
    border: 1px solid rgba(255,255,255,.55) !important;
    box-shadow: 0 14px 32px -20px rgba(20,20,40,.28), inset 0 1px 0 rgba(255,255,255,.5) !important;
  }
